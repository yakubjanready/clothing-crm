# Yengil deploy stack — t3.micro uchun.
# postgres + redis + backend (FastAPI) + frontend (React/nginx).
# frontend = kirish nuqtasi (port 80): / -> UI, /api & /docs -> backend.
# Ishga tushirish:
#   docker compose -f docker-compose.deploy.yml up -d --build
#   docker compose -f docker-compose.deploy.yml exec backend alembic upgrade head
#   docker compose -f docker-compose.deploy.yml exec backend python -m app.scripts.seed_rbac

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [crm]

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    networks: [crm]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: crm-backend:prod
    container_name: crm-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    networks: [crm]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_API_V1_PREFIX: /api/v1
    image: crm-frontend:prod
    container_name: crm-frontend
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "80:80"
    networks: [crm]

volumes:
  postgres_data:

networks:
  crm:
    driver: bridge
