# Tashqi reverse proxy — barcha so'rovlar shu yerga kiradi.
# / → frontend (SPA), /api/ → backend, /ws/ → backend (WebSocket), /media/ → backend statik.
# gzip, security headers, rate limit (auth + api).

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens    off;        # nginx versiyasini yashirish
    client_max_body_size 10m;    # rasm yuklash uchun

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --- Rate limit zonalari ---
    # 5 ta urinish/daqiqa per-IP — login/refresh uchun (brute-force himoyasi)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    # 60 ta so'rov/soniya per-IP — umumiy API uchun (burst 100)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/s;

    # --- Upstreams ---
    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream frontend {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # --- WebSocket Upgrade map ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # --- Security headers (har javobga qo'shiladi) ---
        add_header X-Frame-Options              "DENY"                          always;
        add_header X-Content-Type-Options       "nosniff"                       always;
        add_header X-XSS-Protection             "1; mode=block"                 always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        # CSP — tor sozlama: faqat o'z domen, inline shart (React/Tailwind uchun),
        # connect-src wss: WebSocket /ws/ uchun, data: rasmlar (placeholder).
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # HSTS faqat TLS sozlangandan keyin yoqilsin (https serverda):
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # --- Login / refresh — qattiq rate limit ---
        location ~ ^/api/v1/auth/(login|refresh)$ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 30s;
        }

        # --- WebSocket: /ws/notifications → backend /api/v1/ws/notifications ---
        location /ws/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend/api/v1/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;  # uzoq ulanish uchun
        }

        # --- Umumiy /api ---
        location /api/ {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 60s;
        }

        # --- /media — yuklab olingan rasmlar (backend volume orqali) ---
        location /media/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            expires 30d;
            access_log off;
        }

        # --- /health — nginx o'zining tezkor javobi ---
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # --- Frontend SPA ---
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
        }
    }
}
