# Tashqi reverse proxy — barcha so'rovlar shu yerga kiradi.
# Domain: negative.uz (Let's Encrypt TLS).
# / → frontend (SPA), /api/ → backend, /ws/ → backend (WebSocket), /media/ → backend statik.
# gzip, security headers, HSTS, rate limit (auth + api).

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens    off;        # nginx versiyasini yashirish
    client_max_body_size 10m;    # rasm yuklash uchun

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --- Rate limit zonalari ---
    # 5 ta urinish/daqiqa per-IP — login/refresh uchun (brute-force himoyasi)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    # 60 ta so'rov/soniya per-IP — umumiy API uchun (burst 100)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/s;

    # --- Upstreams ---
    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream frontend {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # --- WebSocket Upgrade map ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────
    # 1) Default server (port 80/443) — boshqa Host bilan kelganlar
    #    uchun ulanishni shovqinsiz uzamiz (444).
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        # ACME so'rovlari oddiy IP'ga ham kelishi mumkin — webroot'ni doim ochiq qoldiramiz
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 444;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # 2) HTTP → HTTPS redirect (negative.uz + www.negative.uz)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name negative.uz www.negative.uz;

        # ACME http-01 challenge — webroot orqali certbot tomonidan ishlatiladi
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Boshqa hammasi HTTPS'ga yo'naltiriladi
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # 3) www → apex redirect (HTTPS)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.negative.uz;

        ssl_certificate     /etc/letsencrypt/live/negative.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/negative.uz/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        return 301 https://negative.uz$request_uri;
    }

    # ─────────────────────────────────────────────────────────────────
    # 4) Asosiy TLS server: https://negative.uz
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name negative.uz;

        # --- TLS ---
        ssl_certificate     /etc/letsencrypt/live/negative.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/negative.uz/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # --- Security headers (har javobga qo'shiladi) ---
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options              "DENY"                          always;
        add_header X-Content-Type-Options       "nosniff"                       always;
        add_header X-XSS-Protection             "1; mode=block"                 always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        # CSP — tor sozlama: faqat o'z domen, inline shart (React/Tailwind uchun),
        # connect-src wss: WebSocket /ws/ uchun, data: rasmlar (placeholder).
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # --- Certbot renewal challenge ---
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # --- Login / refresh — qattiq rate limit ---
        location ~ ^/api/v1/auth/(login|refresh)$ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 30s;
        }

        # --- WebSocket: /ws/notifications → backend /api/v1/ws/notifications ---
        location /ws/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend/api/v1/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;  # uzoq ulanish uchun
        }

        # --- Umumiy /api ---
        location /api/ {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 60s;
        }

        # --- /media — yuklab olingan rasmlar (backend volume orqali) ---
        location /media/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            expires 30d;
            access_log off;
        }

        # --- /health — nginx o'zining tezkor javobi ---
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # --- Frontend SPA ---
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # 5) Default 443 sertifikat — boshqa Host'lar uchun
    #    (sertifikat negative.uz uchun bo'lgani uchun shu yerda ham foydalanamiz —
    #     fingerprint chiqmasligi uchun darhol 444 qaytaramiz)
    # ─────────────────────────────────────────────────────────────────
    # Eslatma: yuqoridagi 443 server bloki default_server qilingani uchun
    # noma'lum Host bilan kelgan TLS so'rovlar shu yerda yakunlanadi va 444 emas,
    # to'g'ridan-to'g'ri negative.uz kabi javob beradi.
    # Agar qattiq ajratish kerak bo'lsa, alohida default_server 443 ssl bloki
    # snakeoil sertifikat bilan qo'yiladi.
}
