# Frontend container ichidagi nginx — faqat statik fayllar va SPA fallback.
# Reverse proxy (api/ws/security) tashqi `nginx/nginx.conf` da.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tasodifiy directory listing bo'lmasligi
    autoindex off;
    client_max_body_size 10m;

    # --- API reverse proxy → backend (deploy uchun qo'shildi) ---
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — React Router URL'lari uchun
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashlangan asset'lar uzoq cache
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # index.html ni hech qachon cache'lash kerak emas (deploy'dan keyin yangilanishi shart)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Containerning ichki healthcheck endpointi
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
