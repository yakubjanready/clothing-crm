# =====================================================================
#  Ulgurji Kiyim-kechak CRM — CI/CD pipeline (demo, soddalashtirilgan)
#  Har "git push" da avtomatik ishga tushadi: build -> test -> deploy
#  (To'liq, 7-jobli versiya: .gitlab-ci.full.yml faylida saqlangan.)
# =====================================================================

stages:
  - build
  - test
  - deploy

# 1) BUILD — loyiha yig'iladi
build-job:
  stage: build
  image: python:3.12-slim
  script:
    - echo "📦 CRM loyihasi yig'ilmoqda..."
    - echo "Build muvaffaqiyatli yakunlandi ✅"

# 2) TEST — backend kodi avtomatik tekshiriladi (sintaksis testi)
test-job:
  stage: test
  image: python:3.12-slim
  script:
    - echo "🧪 Kod tekshirilmoqda..."
    - cd backend && python -m compileall app -q
    - echo "Barcha testlar muvaffaqiyatli o'tdi ✅"

# 3) DEPLOY — o'zgarish serverga chiqariladi (faqat master/main branch)
deploy-job:
  stage: deploy
  script:
    - echo "🚀 O'zgarish AWS serverga chiqarilmoqda..."
    - echo "Deploy muvaffaqiyatli yakunlandi ✅"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
