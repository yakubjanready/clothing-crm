# pre-commit hooks — `pip install pre-commit && pre-commit install`
# Maqsad: kod sifatini commit oldidan kafolatlash.
# mypy bu yerga qo'shilmagan (juda sekin); Makefile orqali alohida ishlatiladi.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^frontend/(package-lock\.json|.*\.css)$

  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/
        exclude: ^backend/alembic/versions/
      - id: ruff-format
        files: ^backend/
        exclude: ^backend/alembic/versions/

  # Python: black (qo'shimcha formatlashtirish — ruff bilan to'qnashishi mumkin
  # bo'lgan kichik holatlarda foydali)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/
        exclude: ^backend/alembic/versions/

  # Frontend: prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(ts|tsx|json|css|md)$
        additional_dependencies:
          - prettier@3.3.3
