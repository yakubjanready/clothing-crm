#cloud-config
# CRM application server bootstrap — birinchi yuklanishda bajariladi.
# Komponentlar: tizim yangilash, Docker + Compose, deploy user, sshd hardening, ufw.

hostname: crm-app-01
fqdn: crm-app-01.local
manage_etc_hosts: true
timezone: Asia/Tashkent

# ─────────── Foydalanuvchilar ───────────
users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBpYUMBNKqfXtgzI/BXHtD94ShDyR4hbBC7eDul0lAm4 crm-deploy@hetzner

# ─────────── Paketlar ───────────
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - htop
  - git
  - unzip

# ─────────── Yozma fayllar ───────────
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    permissions: "0644"
    content: |
      # CRM SSH hardening — root va parol bilan kirish taqiqlangan
      PermitRootLogin no
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      KbdInteractiveAuthentication no
      UsePAM yes
      X11Forwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2
      MaxAuthTries 3

  - path: /etc/sysctl.d/99-crm.conf
    permissions: "0644"
    content: |
      # Tarmoq optimallashtirish — orta yuk uchun
      net.core.somaxconn = 1024
      net.ipv4.tcp_max_syn_backlog = 1024
      net.ipv4.ip_local_port_range = 10000 65535
      vm.overcommit_memory = 1
      fs.file-max = 200000

  - path: /etc/fail2ban/jail.d/sshd.local
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      port = ssh
      maxretry = 5
      findtime = 600
      bantime = 3600

# ─────────── Buyruqlar (boot tugagandan keyin) ───────────
runcmd:
  # Docker rasmiy repo
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker deploy
  # UFW (firewall — Hetzner FW'ga qo'shimcha)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  # SSH hardening qo'llanishi
  - systemctl reload ssh
  - sysctl -p /etc/sysctl.d/99-crm.conf
  - systemctl enable --now fail2ban
  # CRM repo katalogi
  - mkdir -p /opt/crm
  - chown -R deploy:deploy /opt/crm
  # Cloud-init yakunlandi belgisi
  - echo "cloud-init done at $(date -u +%FT%TZ)" > /var/log/crm-bootstrap.log

# ─────────── Boot tugagach restart (kernel + sshd uchun) ───────────
power_state:
  mode: reboot
  delay: 30
  condition: True
  message: "Cloud-init tugadi, restart bilan SSH hardening qo'llaniladi"
